server:
  port: 8081

spring:
  application:
    name: sqlboard-backend

  # DataSource configuration for SQLBoard's own metadata database
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sqlboard?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: yj1234

# MyBatis Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

# SQLBoard configuration
sqlboard:
  # Allow execution of update/delete operations
  allow-write-operation: true
  # Maximum rows returned for query
  max-query-rows: 10000
  # Maximum export file size (MB)
  max-export-size: 1000
  # Block dangerous operations (DROP/TRUNCATE) on production environment connections
  block-danger-on-production: true
